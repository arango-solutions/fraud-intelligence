version: "3.8"

services:
  arangodb:
    image: arangodb/arangodb:latest
    container_name: fraud-intelligence-arangodb
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_PASSWORD:-changeme}
    ports:
      - "${ARANGO_PORT:-8529}:8529"
    volumes:
      - arangodb_data:/var/lib/arangodb3
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8529/_api/version"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  arangodb_data:

